name: remoterm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # SSH
  dartssh2: ^2.10.1
  
  # Terminal
  xterm: ^4.0.0
  
  # Secure storage
  flutter_secure_storage: ^9.2.4
  
  # File picker for private key/project selection
  file_picker: ^8.1.7
  
  # UUID for IDs
  uuid: ^4.5.1
  
  # Shared preferences for local persistence
  shared_preferences: ^2.3.5

  # Path manipulation
  path: ^1.9.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
